spring:
  application:
    name: queueify-campaign-service

  datasource:
    url: jdbc:mysql://localhost:3306/queueify
    username: root
    password: root

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info